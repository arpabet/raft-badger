name: Release

# Go libraries are consumed straight from a git tag (go get / pkg.go.dev), so
# "deploy" here means cutting a GitHub Release for the pushed semver tag after
# the test suite passes.
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

# Keep go.arpabet.com modules off Google's public module proxy/checksum DB:
# GOPRIVATE expands to GONOPROXY + GONOSUMDB, so these modules are fetched
# directly from source and not cached by proxy.golang.org / sum.golang.org.
env:
  GOPRIVATE: go.arpabet.com/*

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test -race ./...

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
